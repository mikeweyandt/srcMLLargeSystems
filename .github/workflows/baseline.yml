name: Generate baseline

on:
  workflow_dispatch:
    inputs:
      srcml_version:
        description: "Override srcml release version (default: read from config)"
        required: false
        default: ""
      kernel_tag:
        description: "Override Linux kernel tag (default: read from config)"
        required: false
        default: ""
      dry_run:
        description: "Build the archive but skip publishing a release / opening a PR"
        required: false
        default: "false"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: baseline-${{ inputs.srcml_version }}-${{ inputs.kernel_tag }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - name: Install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd git curl ca-certificates jq

      - name: Install mikefarah yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Resolve config
        id: cfg
        run: |
          set -euo pipefail
          SV="$(yq -p toml '.srcml.version' config/baseline.toml)"
          OS="$(lsb_release -rs)"
          KR="$(yq -p toml '.kernel.repo' config/baseline.toml)"
          KT="$(yq -p toml '.kernel.tag' config/baseline.toml)"
          FLAGS="$(yq -p toml -r '.srcml_flags | join(" ")' config/baseline.toml)"

          # dispatch overrides
          [ -n "${{ inputs.srcml_version }}" ] && SV="${{ inputs.srcml_version }}"
          [ -n "${{ inputs.kernel_tag }}" ]   && KT="${{ inputs.kernel_tag }}"

          TAG="baseline-linux-${KT}-srcml-${SV}"

          {
            echo "srcml_version=$SV"
            echo "srcml_os=$OS"
            echo "kernel_repo=$KR"
            echo "kernel_tag=$KT"
            echo "srcml_flags=$FLAGS"
            echo "release_tag=$TAG"
            echo "xml_name=${TAG}.xml"
            echo "zst_name=${TAG}.xml.zst"
            echo "manifest_name=${TAG}.manifest.json"
            echo "log_name=${TAG}.generate.log"
          } >> "$GITHUB_OUTPUT"

      - name: Install pinned srcml release
        env:
          SV: ${{ steps.cfg.outputs.srcml_version }}
          OS: ${{ steps.cfg.outputs.srcml_os }}
        run: |
          set -euxo pipefail
          URL="https://github.com/srcML/srcML/releases/download/v${SV}/srcml_${SV}-1_ubuntu${OS}_amd64.deb"
          curl -fsSL -o srcml.deb "$URL"
          sudo apt-get install -y ./srcml.deb
          srcml --version

      - name: Clone Linux kernel
        env:
          KR: ${{ steps.cfg.outputs.kernel_repo }}
          KT: ${{ steps.cfg.outputs.kernel_tag }}
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch "$KT" "$KR" linux

      - name: Generate baseline archive
        id: gen
        env:
          SRCML_BIN: srcml
          SRCML_FLAGS: ${{ steps.cfg.outputs.srcml_flags }}
          INPUT_DIR: linux
          OUTPUT_XML: ${{ steps.cfg.outputs.xml_name }}
          OUTPUT_ZST: ${{ steps.cfg.outputs.zst_name }}
          LOG_FILE: ${{ steps.cfg.outputs.log_name }}
        run: ./scripts/generate_baseline.sh

      - name: Emit manifest
        id: manifest
        env:
          SV: ${{ steps.cfg.outputs.srcml_version }}
          KT: ${{ steps.cfg.outputs.kernel_tag }}
          FLAGS: ${{ steps.cfg.outputs.srcml_flags }}
          RAW: ${{ steps.gen.outputs.raw_bytes }}
          ZST: ${{ steps.gen.outputs.zst_bytes }}
          SHA: ${{ steps.gen.outputs.sha256 }}
          ZST_NAME: ${{ steps.cfg.outputs.zst_name }}
          MANIFEST_NAME: ${{ steps.cfg.outputs.manifest_name }}
        run: |
          jq -n \
            --arg srcml_version "$SV" \
            --arg kernel_tag    "$KT" \
            --arg flags         "$FLAGS" \
            --arg asset_name    "$ZST_NAME" \
            --arg bytes_raw     "$RAW" \
            --arg bytes_zst     "$ZST" \
            --arg sha256        "$SHA" \
            --arg generated_at  "$(date --iso-8601=seconds)" \
            --arg runner_os     "$(lsb_release -ds 2>/dev/null || uname -a)" \
            '{
              srcml_version:$srcml_version,
              kernel_tag:$kernel_tag,
              flags:$flags,
              asset_name:$asset_name,
              bytes_raw:($bytes_raw|tonumber),
              bytes_compressed:($bytes_zst|tonumber),
              sha256:$sha256,
              generated_at:$generated_at,
              runner_os:$runner_os
            }' > "$MANIFEST_NAME"
          cat "$MANIFEST_NAME"

      - name: Upload scratch artifact (dry_run path)
        if: ${{ inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: baseline-dry-run-${{ steps.cfg.outputs.release_tag }}
          path: |
            ${{ steps.cfg.outputs.zst_name }}
            ${{ steps.cfg.outputs.manifest_name }}
            ${{ steps.cfg.outputs.log_name }}
          retention-days: 14

      - name: Publish GitHub Release
        if: ${{ inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.cfg.outputs.release_tag }}
          SV: ${{ steps.cfg.outputs.srcml_version }}
          KT: ${{ steps.cfg.outputs.kernel_tag }}
          ZST_NAME: ${{ steps.cfg.outputs.zst_name }}
          MANIFEST_NAME: ${{ steps.cfg.outputs.manifest_name }}
          LOG_NAME: ${{ steps.cfg.outputs.log_name }}
        run: |
          set -euxo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ZST_NAME" "$MANIFEST_NAME" "$LOG_NAME" --clobber
          else
            gh release create "$TAG" \
              --title "Baseline: linux $KT / srcml $SV" \
              --notes "Baseline srcML archive. srcml=$SV, kernel=$KT. See $MANIFEST_NAME for sha256 and flags." \
              --latest=false \
              "$ZST_NAME" "$MANIFEST_NAME" "$LOG_NAME"
          fi

      - name: Write pointer update
        if: ${{ inputs.dry_run != 'true' }}
        env:
          TAG: ${{ steps.cfg.outputs.release_tag }}
        run: |
          yq -i -p toml -o toml '.current_baseline_release = strenv(TAG)' config/baseline.toml

      - name: Open baseline pointer PR
        if: ${{ inputs.dry_run != 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: point baseline to ${{ steps.cfg.outputs.release_tag }}"
          branch: baseline-pointer/${{ steps.cfg.outputs.release_tag }}
          title: "Update baseline pointer → ${{ steps.cfg.outputs.release_tag }}"
          body: |
            Automated PR to update `config/baseline.toml` → `current_baseline_release`.

            - srcml version: ${{ steps.cfg.outputs.srcml_version }}
            - kernel tag:    ${{ steps.cfg.outputs.kernel_tag }}
            - release tag:   ${{ steps.cfg.outputs.release_tag }}

            Release assets are published. Merge to make downstream runs use this baseline.
          add-paths: |
            config/baseline.toml
